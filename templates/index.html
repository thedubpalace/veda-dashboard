<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veda Dashboard</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base:      "var(--bg-base)",
            surface:   "var(--bg-surface)",
            surfacehi: "var(--bg-surface-hi)",
            modal:     "var(--bg-modal)",
            accent:    "var(--accent)",
            edge:      "var(--border-default)",
            divider:   "var(--border-divider)",
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "Fira Code", "monospace"],
          },
        },
      },
    };
  </script>
  <style>
    :root {
      /* Backgrounds */
      --bg-base:        #0e0d0b;
      --bg-surface:     #161410;
      --bg-surface-hi:  #1c1a15;
      --bg-modal:       #131109;

      /* Borders */
      --border-default: #2a2519;
      --border-divider: #1f1c14;
      --border-focus:   #d97706;

      /* Text */
      --text-primary:   #f2ede4;
      --text-secondary: #a39a88;
      --text-muted:     #635c4e;
      --text-on-accent: #171310;

      /* Accent (amber) */
      --accent:         #d97706;
      --accent-dim:     #2d2007;
      --accent-border:  #6b4a12;
      --accent-text:    #f0a030;

      /* Status: Running */
      --status-running:      #d97706;
      --status-running-text: #f0a030;
      --status-running-bg:   #261c08;

      /* Status: Stopped */
      --status-stopped:      #404550;
      --status-stopped-text: #6b7180;
      --status-stopped-bg:   #191c22;

      /* Typography */
      --font-sans: "Inter", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
    }

    .spinner { animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes pulse {
      0%, 100% { opacity: 0.9; }
      50%       { opacity: 0.25; }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #dockerModal:not(.hidden) { animation: backdropIn 0.2s ease-out; }
    #dockerModal:not(.hidden) > div { animation: panelIn 0.2s ease-out; }
  </style>
</head>
<body style="background:var(--bg-base); font-family:var(--font-sans); color:var(--text-primary);"
      class="min-h-screen antialiased">

  <!-- Toasts -->
  <div id="toasts" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

  <div class="max-w-[900px] mx-auto px-6">

    <!-- Header -->
    <header class="pt-8 pb-10 flex items-end justify-between">
      <h1 style="font-size:22px; font-weight:600; color:var(--text-primary); line-height:1;">Dashboard</h1>
      <div class="flex items-center" style="gap:14px;">

        <!-- Tailscale widget -->
        <div id="tsWidget" style="display:flex; align-items:center; gap:10px;">
          <div style="display:flex; align-items:center; gap:6px;">
            <span id="tsDot" style="width:7px; height:7px; border-radius:50%; background:var(--status-stopped); flex-shrink:0; transition:background-color 120ms ease;"></span>
            <span id="tsLabel" style="font-size:10px; font-weight:500; letter-spacing:0.06em; color:var(--text-muted); white-space:nowrap;">Tailscale</span>
          </div>
          <span id="tsIp" style="font-size:10px; font-family:var(--font-mono); color:var(--accent-text); letter-spacing:0.02em; white-space:nowrap;"></span>
          <button id="tsToggle" onclick="toggleTailscale(this)" disabled
            style="height:24px; padding:0 10px; border:1px solid var(--border-default); background:transparent; color:var(--text-secondary); font-family:var(--font-sans); font-size:10px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; border-radius:3px; cursor:pointer; transition:all 120ms ease; white-space:nowrap;"
            onmouseover="if(!this.disabled){this.style.borderColor='var(--border-focus)'; this.style.color='var(--accent-text)';}"
            onmouseout="this.style.borderColor='var(--border-default)'; this.style.color='var(--text-secondary)';">…</button>
        </div>

        <button id="refreshBtn" onclick="refreshAll()" title="Refresh"
          style="width:28px; height:28px; border:1px solid var(--border-default); border-radius:4px; background:transparent; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color 120ms ease;"
          onmouseover="this.style.borderColor='var(--border-focus)'"
          onmouseout="this.style.borderColor='var(--border-default)'">
          <svg id="refreshIcon" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.5 6A4.5 4.5 0 1 1 8 2.1"/>
            <polyline points="8,1 8,3 10,3"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Veda Apps -->
    <section class="mb-10">
      <div class="flex items-baseline justify-between pb-1.5" style="border-bottom:1px solid var(--border-divider);">
        <h2 style="font-size:12px; font-weight:500; color:var(--text-muted);">Veda Apps</h2>
      </div>
      <div id="vedaBody">
        <div style="padding:24px 0; font-size:12px; color:var(--text-muted);">Loading…</div>
      </div>
    </section>

    <!-- Docker -->
    <section class="mb-10">
      <div class="flex items-baseline justify-between pb-1.5" style="border-bottom:1px solid var(--border-divider);">
        <h2 style="font-size:12px; font-weight:500; color:var(--text-muted);">
          Docker Containers
          <span id="dockerFilterBadge" class="hidden" style="font-size:9px; font-weight:500; color:var(--accent-text); margin-left:8px;"></span>
        </h2>
        <button onclick="openDockerSettings()" title="Filter"
          style="font-size:10px; color:var(--text-muted); background:none; border:1px solid var(--border-default); border-radius:3px; padding:2px 8px; cursor:pointer; letter-spacing:0.06em; text-transform:uppercase; transition:all 120ms ease;"
          onmouseover="this.style.borderColor='var(--border-focus)'; this.style.color='var(--text-secondary)';"
          onmouseout="this.style.borderColor='var(--border-default)'; this.style.color='var(--text-muted)';">Filter</button>
      </div>
      <div id="dockerBody">
        <div style="padding:24px 0; font-size:12px; color:var(--text-muted);">Loading…</div>
      </div>
    </section>

    <!-- Docker Settings Modal -->
    <div id="dockerModal" class="hidden fixed inset-0 z-40 flex items-center justify-center"
         style="background:rgba(0,0,0,0.72);" onclick="closeDockerSettings()">
      <div style="background:var(--bg-modal); border:1px solid var(--border-default); border-radius:8px; width:100%; max-width:420px; padding:24px; margin:0 16px; box-shadow:0 24px 48px rgba(0,0,0,0.6);"
           onclick="event.stopPropagation()">
        <h3 style="font-size:14px; font-weight:600; color:var(--text-primary); margin-bottom:6px;">Docker Filter</h3>
        <p style="font-size:12px; color:var(--text-secondary); margin-bottom:20px; line-height:1.5;">
          Show only containers matching keywords (partial match). Leave empty to show all.
        </p>
        <div id="filterTags" style="display:flex; flex-wrap:wrap; gap:6px; min-height:28px; margin-bottom:12px;"></div>
        <div style="display:flex; gap:8px;">
          <input id="filterInput" type="text" placeholder="Container name, then Enter"
            style="flex:1; background:var(--bg-base); border:1px solid var(--border-default); border-radius:4px; padding:8px 12px; font-size:13px; color:var(--text-primary); outline:none; font-family:var(--font-sans);"
            onfocus="this.style.borderColor='var(--border-focus)'"
            onblur="this.style.borderColor='var(--border-default)'"
            onkeydown="if(event.key==='Enter') addFilterTag()" />
          <button onclick="addFilterTag()"
            style="padding:8px 12px; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; border:1px solid var(--border-default); background:transparent; color:var(--text-secondary); border-radius:4px; cursor:pointer; transition:all 120ms ease;"
            onmouseover="this.style.borderColor='var(--border-focus)'; this.style.color='var(--accent-text)';"
            onmouseout="this.style.borderColor='var(--border-default)'; this.style.color='var(--text-secondary)';">Add</button>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:20px;">
          <button onclick="closeDockerSettings()"
            style="padding:6px 14px; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; border:1px solid var(--border-default); background:transparent; color:var(--text-secondary); border-radius:4px; cursor:pointer; transition:all 120ms ease;"
            onmouseover="this.style.color='var(--text-primary)'"
            onmouseout="this.style.color='var(--text-secondary)'">Cancel</button>
          <button onclick="saveDockerFilter()"
            style="padding:6px 14px; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; border:1px solid var(--accent-border); background:var(--accent-dim); color:var(--accent-text); border-radius:4px; cursor:pointer; transition:all 120ms ease;"
            onmouseover="this.style.background='oklch(26% 0.06 65)'; this.style.borderColor='var(--accent)';"
            onmouseout="this.style.background='var(--accent-dim)'; this.style.borderColor='var(--accent-border)';">Save</button>
        </div>
      </div>
    </div>

    <!-- VMware -->
    <section class="mb-16">
      <div class="flex items-baseline justify-between pb-1.5" style="border-bottom:1px solid var(--border-divider);">
        <h2 style="font-size:12px; font-weight:500; color:var(--text-muted);">VMware VMs</h2>
      </div>
      <div id="vmwareBody">
        <div style="padding:24px 0; font-size:12px; color:var(--text-muted);">Loading…</div>
      </div>
    </section>

    <!-- #15: footer removed -->

  </div>

  <script>
    // ---------- helpers ----------
    function el(tag, cls, html) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html !== undefined) e.innerHTML = html;
      return e;
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    // Status badge (inline text, no capsule)
    function statusBadge(isRunning) {
      const s = document.createElement("span");
      s.textContent = isRunning ? "● RUN" : "○ OFF";
      s.style.cssText = `
        font-size:10px; font-weight:500; letter-spacing:0.08em;
        color:${isRunning ? "var(--status-running-text)" : "var(--status-stopped-text)"};
        white-space:nowrap; flex-shrink:0;
      `;
      return s;
    }

    // Toast — collapse height on exit; no side-bar stripe (#7)
    function toast(message, ok = true) {
      const wrap = document.getElementById("toasts");
      const t = document.createElement("div");
      t.style.cssText = `
        background:var(--bg-modal); border:1px solid var(--border-default);
        border-radius:4px; padding:10px 16px; width:280px;
        box-shadow:0 8px 24px rgba(0,0,0,0.5);
        animation:toastIn 0.2s ease-out;
        font-size:13px; color:${ok ? "var(--text-primary)" : "oklch(72% 0.18 22)"};
        font-family:var(--font-sans); line-height:1.4;
        max-height:80px; overflow:hidden;
      `;
      t.textContent = message;
      wrap.appendChild(t);
      setTimeout(() => {
        t.style.transition = "opacity 0.35s, max-height 0.4s 0.15s, padding-top 0.4s 0.15s, padding-bottom 0.4s 0.15s";
        t.style.opacity = "0";
        t.style.maxHeight = "0";
        t.style.paddingTop = "0";
        t.style.paddingBottom = "0";
      }, 3500);
      setTimeout(() => t.remove(), 4200);
    }

    // Ghost button — #2: height reduced to 24px
    function btn(label, kind, onClick) {
      const b = document.createElement("button");
      const hoverStyles = {
        start:   { border: "var(--status-running)", color: "var(--status-running-text)", bg: "var(--status-running-bg)" },
        stop:    { border: "oklch(52% 0.18 22)",    color: "oklch(62% 0.18 22)",         bg: "oklch(12% 0.06 22)" },
        shell:   { border: "var(--accent)",          color: "var(--accent-text)",          bg: "var(--accent-dim)" },
      };
      const h = hoverStyles[kind] || hoverStyles.start;
      b.textContent = label;
      b.dataset.label = label;
      b.style.cssText = `
        width:100%; height:24px; border:1px solid var(--border-default);
        background:transparent; color:var(--text-secondary);
        font-family:var(--font-sans); font-size:10px; font-weight:500;
        letter-spacing:0.06em; text-transform:uppercase;
        border-radius:3px; cursor:pointer; transition:all 120ms ease;
        white-space:nowrap;
      `;
      b.onmouseenter = () => {
        if (b.disabled) return;
        b.style.borderColor = h.border;
        b.style.color = h.color;
        b.style.backgroundColor = h.bg;
      };
      b.onmouseleave = () => {
        b.style.borderColor = "var(--border-default)";
        b.style.color = "var(--text-secondary)";
        b.style.backgroundColor = "transparent";
      };
      b.onclick = () => onClick(b);
      return b;
    }

    // action() — #1: pendingLabel keeps button in "Restarting…" state during postDelay
    async function action(b, url, body, postDelay = 600, silentRefresh = false, pendingLabel = null) {
      const all = b.parentElement.querySelectorAll("button");
      all.forEach((x) => { x.disabled = true; x.style.opacity = "0.4"; x.style.cursor = "not-allowed"; });
      const original = b.innerHTML;
      b.innerHTML = '<svg class="spinner" width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="14 8" stroke-linecap="round"/></svg>';
      try {
        const opts = { method: "POST" };
        if (body) {
          opts.headers = { "Content-Type": "application/json" };
          opts.body = JSON.stringify(body);
        }
        const res = await fetch(url, opts);
        let data = {};
        try { data = await res.json(); } catch (_) {}
        const ok = res.ok && data.ok !== false;
        toast(data.message || data.error || (ok ? "Done" : "Failed"), ok);
      } catch (e) {
        toast(e.message || "Request failed", false);
      } finally {
        if (pendingLabel) {
          // Keep this button in a "pending" disabled state; re-enable others
          b.textContent = pendingLabel;
          b.style.opacity = "0.5";
          b.style.cursor = "not-allowed";
          b.style.color = "var(--status-running-text)";
          b.style.borderColor = "var(--accent-border)";
          all.forEach((x) => { if (x !== b) { x.disabled = false; x.style.opacity = ""; x.style.cursor = "pointer"; } });
          setTimeout(() => {
            b.innerHTML = original;
            b.disabled = false;
            b.style.opacity = "";
            b.style.cursor = "pointer";
            b.style.color = "var(--text-secondary)";
            b.style.borderColor = "var(--border-default)";
            refreshAll(silentRefresh);
          }, postDelay);
        } else {
          b.innerHTML = original;
          all.forEach((x) => { x.disabled = false; x.style.opacity = ""; x.style.cursor = "pointer"; });
          setTimeout(() => refreshAll(silentRefresh), postDelay);
        }
      }
    }

    // Row factory — #2: action column 96px; #8: non-monitorable bar uses width:0
    function row(isRunning, cells, actionBtns, monitorable = true) {
      const r = document.createElement("div");
      r.style.cssText = `
        display:flex; align-items:stretch;
        border-bottom:1px solid var(--border-divider);
        transition:background-color 120ms ease;
        cursor:default; min-height:44px;
      `;
      r.onmouseenter = () => r.style.backgroundColor = "var(--bg-surface-hi)";
      r.onmouseleave = () => r.style.backgroundColor = "";

      // Left status bar — #8: width:0 for non-monitorable (no phantom space)
      const bar = document.createElement("div");
      if (monitorable) {
        bar.style.cssText = `
          width:2px; flex-shrink:0; align-self:stretch;
          background:${isRunning ? "var(--status-running)" : "var(--border-divider)"};
          transition:background-color 120ms ease;
          opacity:${isRunning ? "0.9" : "0.4"};
        `;
      } else {
        bar.style.cssText = "width:0; flex-shrink:0;";
      }
      r.appendChild(bar);

      // Content
      const content = document.createElement("div");
      content.style.cssText = "flex:1; min-width:0; padding:10px 0 10px 14px; overflow:hidden;";
      cells.forEach(c => content.appendChild(c));
      r.appendChild(content);

      // Actions — #2: 96px wide
      const actions = document.createElement("div");
      actions.style.cssText = "display:flex; flex-direction:column; gap:4px; padding:10px 16px 10px 12px; width:96px; flex-shrink:0; justify-content:center;";
      actionBtns.forEach(b => actions.appendChild(b));
      r.appendChild(actions);

      return r;
    }

    // ---------- cell builders ----------
    // Line 1: name + optional status badge
    function nameLine(name, isRunning, monitorable = true) {
      const line1 = document.createElement("div");
      line1.style.cssText = "display:flex; align-items:center; justify-content:space-between; gap:8px;";
      const n = document.createElement("span");
      n.textContent = name;
      n.style.cssText = "font-size:14px; font-weight:600; color:var(--text-primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;";
      line1.appendChild(n);
      if (monitorable) line1.appendChild(statusBadge(isRunning));
      return line1;
    }

    // Secondary description line
    function descLine(text) {
      const d = document.createElement("div");
      d.textContent = text;
      d.style.cssText = "font-size:12px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; line-height:1.4;";
      return d;
    }

    // Tertiary mono metadata line — color accepts bool (accent) or CSS string
    function monoLine(text, color) {
      const m = document.createElement("div");
      m.textContent = text;
      const c = !color ? "var(--text-muted)"
               : color === true ? "var(--accent-text)"
               : color;
      m.style.cssText = `font-size:10px; font-family:var(--font-mono); color:${c}; letter-spacing:0.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;`;
      return m;
    }

    function emptyRow(text) {
      const e = document.createElement("div");
      e.textContent = text;
      e.style.cssText = "padding:24px 0; font-size:12px; color:var(--text-muted);";
      return e;
    }

    // ---------- renderers ----------
    function renderVeda(apps) {
      const body = document.getElementById("vedaBody");
      body.innerHTML = "";
      if (!apps.length) { body.appendChild(emptyRow("No apps in registry.")); return; }
      apps.forEach((a) => {
        const running = a.status === "running";
        const mon = a.monitorable !== false;
        const n = a.claudeSessions || 0;
        const enc = encodeURIComponent(a.name);
        // #5: skip description line when empty — no bare "—"
        const cells = [nameLine(a.name, running, mon)];
        if (a.description) cells.push(descLine(a.description));
        if (a.runCmd) cells.push(monoLine(a.runCmd));
        // #9: claude sessions line uses text-secondary (not accent) to avoid diluting accent
        if (n > 0) cells.push(monoLine(`claude  ×${n}`, "var(--text-secondary)"));
        const btns = [];
        if (a.runCmd) {
          btns.push(running
            ? btn("Stop",    "stop",  (b) => action(b, `/api/apps/${enc}/stop`))
            : btn("Start",   "start", (b) => action(b, `/api/apps/${enc}/start`)));
          // #1: Restart shows "Restarting…" label during 5s wait
          if (running) {
            btns.push(btn("Restart", "start", (b) => action(b, `/api/apps/${enc}/restart`, undefined, 5000, true, "Restarting…")));
          }
        }
        if (n > 0) {
          btns.push(btn(`Kill ×${n}`, "stop", (b) => action(b, `/api/apps/${enc}/claude-sessions/kill-all`)));
        }
        if (a.localPath) {
          btns.push(btn("Claude", "shell", (b) => action(b, `/api/apps/${enc}/shell`)));
        }
        body.appendChild(row(running, cells, btns, mon));
      });
    }

    function renderDocker(d) {
      const body = document.getElementById("dockerBody");
      const badge2 = document.getElementById("dockerFilterBadge");
      body.innerHTML = "";
      if (!d || d.available === false) {
        badge2.classList.add("hidden");
        body.appendChild(emptyRow("Docker is not installed or not running."));
        return;
      }
      const list = d.containers || [];
      const filtered = d.filtered && (d.filterList || []).length > 0;
      if (filtered) {
        badge2.textContent = "filtered: " + d.filterList.join(", ");
        badge2.classList.remove("hidden");
      } else {
        badge2.classList.add("hidden");
      }
      if (d.error) { body.appendChild(emptyRow("Error: " + d.error)); return; }
      if (!list.length) {
        body.appendChild(emptyRow(filtered ? "No containers match the filter." : "No containers."));
        return;
      }
      list.forEach((c) => {
        const running = c.status === "running";
        const cells = [nameLine(c.name, running)];
        if (c.image) cells.push(descLine(c.image));
        if (c.ports) {
          cells.push(monoLine(c.ports, true));
        } else if (c.statusText) {
          cells.push(monoLine(c.statusText));
        }
        const toggleBtn = running
          ? btn("Stop",  "stop",  (b) => action(b, `/api/docker/${encodeURIComponent(c.name)}/stop`))
          : btn("Start", "start", (b) => action(b, `/api/docker/${encodeURIComponent(c.name)}/start`));
        body.appendChild(row(running, cells, [toggleBtn]));
      });
    }

    // ---------- Docker settings modal ----------
    let _filterTags = [];

    function openDockerSettings() {
      fetch("/api/settings").then(r => r.json()).then(s => {
        _filterTags = [...(s.docker?.filter || [])];
        renderTags();
        document.getElementById("filterInput").value = "";
        document.getElementById("dockerModal").classList.remove("hidden");
        document.getElementById("filterInput").focus();
      });
    }

    function closeDockerSettings() {
      document.getElementById("dockerModal").classList.add("hidden");
    }

    function renderTags() {
      const wrap = document.getElementById("filterTags");
      wrap.innerHTML = "";
      _filterTags.forEach((tag, i) => {
        const t = document.createElement("span");
        t.style.cssText = "display:inline-flex; align-items:center; gap:6px; background:transparent; border:1px solid var(--border-default); border-radius:3px; padding:2px 8px; font-size:11px; color:var(--text-secondary);";
        const label = document.createElement("span");
        label.textContent = tag;
        const rm = document.createElement("button");
        rm.textContent = "✕";
        rm.style.cssText = "background:none; border:none; color:var(--text-muted); cursor:pointer; line-height:1; font-size:11px; padding:0; transition:color 120ms ease;";
        rm.onmouseover = () => rm.style.color = "var(--text-primary)";
        rm.onmouseout = () => rm.style.color = "var(--text-muted)";
        rm.onclick = () => removeTag(i);
        t.appendChild(label);
        t.appendChild(rm);
        wrap.appendChild(t);
      });
      if (!_filterTags.length) {
        const empty = document.createElement("span");
        empty.textContent = "Showing all containers";
        empty.style.cssText = "font-size:11px; color:var(--text-muted); font-style:italic;";
        wrap.appendChild(empty);
      }
    }

    function addFilterTag() {
      const input = document.getElementById("filterInput");
      const val = input.value.trim();
      if (val && !_filterTags.includes(val)) {
        _filterTags.push(val);
        renderTags();
      }
      input.value = "";
      input.focus();
    }

    function removeTag(i) {
      _filterTags.splice(i, 1);
      renderTags();
    }

    async function saveDockerFilter() {
      try {
        const res = await fetch("/api/settings/docker/filter", {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filter: _filterTags }),
        });
        const data = await res.json();
        if (data.ok) {
          toast("Filter saved", true);
          closeDockerSettings();
          refreshAll();
        } else {
          toast(data.error || "Save failed", false);
        }
      } catch (e) {
        toast(e.message || "Request failed", false);
      }
    }

    function renderVmware(v) {
      const body = document.getElementById("vmwareBody");
      body.innerHTML = "";
      if (!v || v.available === false) {
        body.appendChild(emptyRow("VMware (vmrun.exe) not found."));
        return;
      }
      const list = v.vms || [];
      if (v.error) { body.appendChild(emptyRow("Error: " + v.error)); return; }
      if (!list.length) { body.appendChild(emptyRow("No running VMs.")); return; }
      list.forEach((vm) => {
        const running = vm.status === "running";
        const cells = [nameLine(vm.name, running)];
        // #6: show only filename, not full path
        if (vm.vmx) cells.push(monoLine(vm.vmx.split(/[\\/]/).pop()));
        const toggleBtn = running
          ? btn("Stop",  "stop",  (b) => action(b, "/api/vmware/stop",  { vmx: vm.vmx, force: false }))
          : btn("Start", "start", (b) => action(b, "/api/vmware/start", { vmx: vm.vmx, gui: false }));
        body.appendChild(row(running, cells, [toggleBtn]));
      });
    }

    // ---------- refresh — #3: spin icon; #12: HH:MM only ----------
    let inFlight = false;
    async function refreshAll(silent = false) {
      if (inFlight) return;
      inFlight = true;
      const rb = document.getElementById("refreshBtn");
      const icon = document.getElementById("refreshIcon");
      rb.disabled = true;
      icon.style.animation = "spin 0.7s linear infinite"; // #3
      try {
        const res = await fetch("/api/status");
        const data = await res.json();
        renderVeda(data.veda || []);
        renderDocker(data.docker);
        renderVmware(data.vmware);
      } catch (e) {
        if (!silent) toast("Failed to load status: " + (e.message || e), false);
      } finally {
        icon.style.animation = ""; // #3: stop spin
        rb.disabled = false;
        inFlight = false;
      }
    }

    // ---------- Tailscale ----------
    function renderTailscale(s) {
      const dot = document.getElementById("tsDot");
      const label = document.getElementById("tsLabel");
      const ip = document.getElementById("tsIp");
      const toggle = document.getElementById("tsToggle");
      const connected = !!(s && s.connected);
      dot.style.background = connected ? "var(--status-running)" : "var(--status-stopped)";
      label.style.color = connected ? "var(--status-running-text)" : "var(--text-muted)";
      label.textContent = connected ? "Tailscale ●" : "Tailscale ○";
      ip.textContent = connected && s.ip ? s.ip : "";
      toggle.disabled = false;
      toggle.style.opacity = "";
      toggle.style.cursor = "pointer";
      toggle.textContent = connected ? "Disconnect" : "Connect";
      toggle.dataset.connected = connected ? "1" : "0";
    }

    async function loadTailscale() {
      try {
        const res = await fetch("/api/tailscale/status");
        renderTailscale(await res.json());
      } catch (e) {
        renderTailscale({ connected: false, ip: null });
      }
    }

    async function toggleTailscale(b) {
      const wasConnected = b.dataset.connected === "1";
      b.disabled = true;
      b.style.opacity = "0.5";
      b.style.cursor = "not-allowed";
      const original = b.textContent;
      b.innerHTML = '<svg class="spinner" width="11" height="11" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="14 8" stroke-linecap="round"/></svg>';
      try {
        const res = await fetch("/api/tailscale/toggle", { method: "POST" });
        const data = await res.json();
        renderTailscale(data);
        toast(data.connected ? "Tailscale connected" : "Tailscale disconnected", true);
      } catch (e) {
        toast(e.message || "Tailscale toggle failed", false);
        b.innerHTML = original;
        b.disabled = false;
        b.style.opacity = "";
        b.style.cursor = "pointer";
        loadTailscale();
      }
    }

    // #13: Escape closes Docker modal
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeDockerSettings();
    });

    loadTailscale();
    setInterval(loadTailscale, 15000);
    refreshAll();
    setInterval(refreshAll, 10000);
  </script>
</body>
</html>
